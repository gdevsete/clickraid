<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ClickRaid - Miniaturas Chaveiro de Armas de Fogo. Alta qualidade, detalhes precisos. Coleção exclusiva para entusiastas." />
    <title>ClickRaid | Miniaturas Chaveiro de Armas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel+Decorative:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Block DevTools access
      document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
      document.addEventListener('keydown', function(e) {
        if (
          e.key === 'F12' ||
          (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
          (e.ctrlKey && (e.key === 'U' || e.key === 'u')) ||
          (e.ctrlKey && e.shiftKey && e.key === 'K')
        ) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
      }, true);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
